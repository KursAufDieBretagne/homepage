name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main      # Falls dein Hauptbranch noch 'master' heißt, ändere dies zu 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          submodules: true  # Wichtig, damit das Mainroad-Theme mitgeladen wird
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.102.3' # Deine passgenaue Catalina-Version
          extended: true

      - name: Build Hugo Site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
