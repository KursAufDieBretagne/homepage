<article class="list__item event-card">
	<div class="event-card__content">
		<header class="list__header">
			<h2 class="list__title post__title">
				<a href="{{ .RelPermalink }}" rel="bookmark">{{ .Title }}</a>
			</h2>
			<div class="event-card__meta">
				<div class="event-card__detail">
					<span class="event-card__icon">📅</span>
					<time datetime="{{ .Params.eventDate }}">
						{{ time.Format "02.01.2006" .Params.eventDate }} um {{ time.Format "15:04" .Params.eventDate }} Uhr
					</time>
				</div>
				<div class="event-card__detail">
					<span class="event-card__icon">📍</span>
					<span>{{ .Params.location }}</span>
				</div>
			</div>
		</header>
		<div class="content list__excerpt post__content clearfix">
			{{ .Summary }}
		</div>
		<div class="event-card__footer">
			<a href="{{ .RelPermalink }}" class="btn">Details ansehen</a>
		</div>
	</div>
</article>
