<a href="{{ .Get "url" }}" class="web-link-wrapper" target="_blank" rel="noopener noreferrer" style="display: block; text-decoration: none; box-shadow: none !important; background: none !important; color: inherit !important;">
    <div class="event-card" style="margin-bottom: 1.5rem !important;">
        <h3 style="color: var(--color-marine) !important; border-bottom: none !important; margin-top: 0 !important; box-shadow: none !important; text-decoration: underline !important;">
            {{ .Get "title" }}
        </h3>
        <p style="color: var(--color-text-dark) !important; margin: 0 !important;">
            {{ .Get "desc" }}
        </p>
    </div>
</a>
