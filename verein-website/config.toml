baseurl = "https://kurs-bretagne.de/"
title = "Kurs auf die Bretagne"
theme = "mainroad"
defaultContentLanguage = "de"

[params]
  mainSections = ["blog", "posts"]
  customCSS = ["css/custom.css"]

[params.sidebar]
  home = "right"
  list = "right"
  single = "right"
  widgets = ["search", "recent", "languages"]


# --- DEUTSCH ---
[languages.de]
  languageName = "Deutsch"
  contentDir = "content/de"
  weight = 1
  title = "Kurs auf die Bretagne"

[languages.de.params.logo]
  image = "img/logo.png"
  title = "Kurs auf die Bretagne"
  subtitle = "Für einen gelebten Kulturaustausch zwischen Stralsund & Saint-Malo"

[[languages.de.menu.main]]
  name = "Startseite"
  url = "/"
  weight = 1

[[languages.de.menu.main]]
  name = "Über uns"
  url = "/about/"
  weight = 4

[[languages.de.menu.main]]
  name = "Termine"
  url = "/events/"
  weight = 3

[[languages.de.menu.main]]
  name = "Kontakt"
  url = "/kontakt/"
  weight = 6

[[languages.de.menu.main]]
    name = "Links"
    url = "/links/"
    weight = 5

[[languages.de.menu.main]]
    name = "Aktuelles"
    url = "/blog/"
    weight = 2


